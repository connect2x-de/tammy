workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - compile
  - check
  - publish

.if-merge-request: &if-merge-request
  - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME

.if-release: &if-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'

.if-main: &if-main
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

compile:android:
  stage: compile
  interruptible: true
  tags: [ "connect2x-linux-shell" ]
  rules:
    - *if-main
    - *if-release
  artifacts:
    name: build
    when: always
    expire_in: 1 day
    paths:
      - "build/outputs/bundle"
      - "build/outputs/apk"
  before_script:
    - echo $ANDROID_RELEASE_STORE_FILE_BASE64 | base64 --decode > android_keystore.jks
  script:
    - ./gradlew
      uploadAndroidDistributable
      --stacktrace

compile:linux-x64:
  stage: compile
  interruptible: true
  tags: [ "connect2x-linux-shell" ]
  rules:
    - *if-main
    - *if-release
  artifacts:
    name: build
    when: always
    expire_in: 1 day
    paths:
      - "build/compose"
  script:
    - ./gradlew
      uploadPlatformDistributable
      --stacktrace

compile:web:
  stage: compile
  interruptible: true
  tags: [ "connect2x-linux-shell" ]
  rules:
    - *if-main
    - *if-release
  artifacts:
    name: build
    when: always
    expire_in: 1 day
    paths:
      - "build/compose"
      - "build/dist"
      - "**/build/**/yarn.lock"
  script:
    - ./gradlew
      uploadWebZipDistributable
      --stacktrace

compile:windows-x64:
  stage: compile
  interruptible: true
  tags: [ "connect2x-win" ]
  rules:
    - *if-main
    - *if-release
  artifacts:
    name: build
    when: always
    expire_in: 1 day
    paths:
      - "build/compose"
  script:
    - ./gradlew
      uploadPlatformDistributable
      --stacktrace

compile:macos-x64:
  stage: compile
  interruptible: true
  tags: [ "connect2x-mac" ]
  rules:
    - *if-main
    - *if-release
  artifacts:
    name: build
    when: always
    expire_in: 1 day
    paths:
      - "build/compose"
  before_script:
    - echo $APPLE_KEYCHAIN_FILE_BASE64 | base64 --decode > apple_keychain.keychain
    - security list-keychains -d user -s "$(realpath apple_keychain.keychain)"
    - security unlock-keychain -p $APPLE_KEYCHAIN_PASSWORD "$(realpath apple_keychain.keychain)"
    - security set-keychain-settings -t 600 "$(realpath apple_keychain.keychain)"
  script:
    - ./gradlew
      uploadPlatformDistributable
      --stacktrace

compile:macos-arm64:
  stage: compile
  interruptible: true
  tags: [ "saas-macos-medium-m1" ]
  timeout: 30m
  variables:
    HOMEBREW_NO_AUTO_UPDATE: 1
  rules:
    - *if-main
    - *if-release
  artifacts:
    name: build
    when: always
    expire_in: 1 day
    paths:
      - "build/compose"
  before_script:
    - brew install --cask temurin@21
    - echo $APPLE_KEYCHAIN_FILE_BASE64 | base64 --decode > apple_keychain.keychain
    - security list-keychains -d user -s "$(realpath apple_keychain.keychain)"
    - security unlock-keychain -p $APPLE_KEYCHAIN_PASSWORD "$(realpath apple_keychain.keychain)"
    - security set-keychain-settings -t 600 "$(realpath apple_keychain.keychain)"
  script:
    - ./gradlew
      uploadPlatformDistributable
      --stacktrace

compile:prepare-website:
  stage: compile
  interruptible: true
  tags: [ "connect2x-linux-shell-small" ]
  rules:
    - *if-main
    - *if-release
  artifacts:
    paths:
      - website/config/_default/params.yaml
      - website/static/fastlane
      - website/static/Tammy-Windows-x64.appinstaller
      - website/static/Tammy-Windows-arm64.appinstaller
  script:
    - ./gradlew
      prepareWebsite
      --stacktrace

compile:website:
  stage: compile
  interruptible: true
  tags: [ "connect2x-linux" ]
  image: registry.gitlab.com/pages/hugo/hugo_extended:latest
  needs: [ "compile:prepare-website" ]
  rules:
    - *if-main
    - *if-release
  script:
    - cd website
    - hugo
  artifacts:
    paths:
      - website/public

check:changelog:
  stage: check
  interruptible: true
  timeout: 5m
  tags: [ "connect2x-linux-shell-small" ]
  rules:
    - *if-merge-request
  script:
    - git fetch origin main
    - |
      if git diff --name-only HEAD origin/main | grep "CHANGELOG.md"; then
        echo "CHANGELOG.md has changed"
      else
        echo "CHANGELOG.md has not changed"
        exit 1
      fi

publish:release:website:
  stage: publish
  tags: [ "connect2x-linux-shell-small" ]
  rules:
    - *if-main
    - *if-release
  variables:
    SSH_SERVER_PUBLIC_KEY: |
