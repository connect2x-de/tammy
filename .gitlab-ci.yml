publish:beta:playstore:
  stage: publish
  interruptible: true
  tags: [ "connect2x-linux-shell-small" ]
  rules:
    - *if-main
  artifacts:
    name: build
    when: always
    expire_in: 1 day
    paths:
      - "build/outputs/bundle"
      - "build/outputs/apk"
  before_script:
    - echo $ANDROID_RELEASE_STORE_FILE_BASE64 | base64 --decode > android_keystore.jks
    - echo $ANDROID_SERVICE_ACCOUNT_JSON_BASE64 | base64 --decode > android_service-account.json
  script:
    - fastlane android releaseBeta

publish:release:playstore:
